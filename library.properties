name=PCMFlowG711
version=0.2.0
author=TANAKA Masayuki
maintainer=TANAKA Masayuki
sentence=G.711 (mu-law / A-law) codec add-on for PCMFlow, focused on real-time voice (VoIP, ESP-NOW transceivers).
paragraph=Pure MIT implementation of ITU-T G.711 mu-law (PCMU) and A-law (PCMA). Exposes G711Encoder / G711Decoder via PCMFlow's PCMSink / PCMSource interfaces. Operates on raw G.711 bytes, suitable for ESP-NOW, RTP, UDP, and WebSocket carriers. No third-party vendored code; flash footprint under 4 KB.
category=Signal Input/Output
url=https://github.com/tanakamasayuki/PCMFlowG711
architectures=*
depends=PCMFlow
includes=PCMFlowG711.h
